<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WayQuizz - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: url("8.png") no-repeat center center/cover;
  }

  /* NAVBAR */
  nav {
    background: #141a2a;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #6edbd5;
    font-size: 24px;
    font-weight: 700;
  }

  .logo img {
    height: 40px;
    width: 40px;
    border-radius: 50%;
    object-fit: cover;
  }

  .signup-btn {
    background: #6edbd5;
    color: #111;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }

  /* CENTER CONTAINER */
  .container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* GLASS CARD */
  .login-box {
    width: 420px;
    padding: 40px;
    border-radius: 15px;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    text-align: center;
  }

  .login-box h2 {
    margin-bottom: 30px;
    font-size: 28px;
    color: #f2e9b8;
  }

  /* INPUT GROUP */
  .input-group {
    position: relative;
    margin: 20px 0;
  }

  .input-group input {
    width: 100%;
    padding: 12px 40px 12px 10px;
    background: #dfe8ffcc; /* lighter background for input */
    border: none;
    border-bottom: 1px solid #ccc;
    color: #111;
    font-size: 15px;
    outline: none;
    border-radius: 4px;
  }

  /* Icon inside inputs */
  .input-group span {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
  }

  /* Different icon colors matching screenshot */
  .input-group span.email-icon {
    color: #f1e19b;
  }

  .input-group span.lock-icon {
    color: #f6c200;
  }

  /* OPTIONS */
  .options {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin: 15px 0;
    color: #f2e9b8;
  }

  .options a {
    color: #f2e9b8;
    text-decoration: none;
  }

  /* LOGIN BUTTON */
  .login-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #63b7b6;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .login-btn:hover {
    opacity: 0.9;
  }

  /* DIVIDER */
  .divider {
    margin: 25px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #f2e9b8;
    font-size: 14px;
  }

  .divider hr {
    flex: 1;
    border: none;
    height: 1px;
    background: #aaa;
    opacity: 0.6;
  }

  /* SOCIAL BUTTONS */
  .social {
    display: flex;
    justify-content: center;
    gap: 15px;
  }

  .social button {
    width: 45px;
    height: 45px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 20px;
    background: #1e2433;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.3s ease;
  }

  /* Individual social button colors */
  .social button.telegram {
    background-color: #0088cc;
  }

  .social button.google {
    background-color: #db4437;
  }

  .social button.facebook {
    background-color: #1877f2;
  }

  .social button:hover {
    opacity: 0.85;
  }
</style>
</head>

<body>

<nav>
  <div class="logo"><img src="2.jpg" alt="WayQuizz Logo" />WayQuizz</div>
  <a href="signup.html"><button class="signup-btn">Sign Up</button></a>
</nav>

<div class="container">
  <div class="login-box">
    <h2>Welcome Back</h2>

    <form id="loginForm" novalidate>
      <div class="input-group">
        <input type="email" placeholder="Email" id="email" name="email" required />
        <span class="email-icon">✉</span>
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password" id="password" name="password" required />
        <span class="lock-icon">🔒</span>
      </div>

      <div class="options">
        <label><input type="checkbox" id="rememberMe" /> Remember me</label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">Log In</button>
    </form>

    <div class="divider">
      <hr /><span>or continue with</span><hr />
    </div>

    <div class="social">
      <button class="telegram" title="Continue with Telegram">✈️</button>
      <button class="google" title="Continue with Google">G</button>
      <button class="facebook" title="Continue with Facebook">f</button>
    </div>
  </div>
</div>

<script>
  window.addEventListener("DOMContentLoaded", function () {
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const rememberMe = document.getElementById("rememberMe").checked;

      let errorMsg = "";

      if (!email) {
        errorMsg += "Email is required.\n";
      } else {
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
          errorMsg += "Please enter a valid email address.\n";
        }
      }

      if (!password) {
        errorMsg += "Password is required.\n";
      } else if (password.length < 6) {
        errorMsg += "Password must be at least 6 characters long.\n";
      }

      if (errorMsg) {
        alert(errorMsg);
        return;
      }

      // Check users list first (new signup format), then fallback to old single-user format
      const users = JSON.parse(localStorage.getItem("users")) || [];
      const legacyUser = JSON.parse(localStorage.getItem("user"));

      const matchedUser =
        users.find((u) => u.email === email && u.password === password) ||
        (legacyUser && legacyUser.email === email && legacyUser.password === password
          ? legacyUser
          : null);

      if (matchedUser) {
        // Save session info, manage rememberMe option
        const currentUser = { email: matchedUser.email, name: matchedUser.username || "" };

        if (rememberMe) {
          localStorage.setItem("currentUser", JSON.stringify(currentUser));
        } else {
          sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
        }

        // Redirect to homepage
        window.location.href = "index.html";
      } else {
        alert("Invalid credentials. Please check your information or sign up first.");
      }
    });
  });
</script>

</body>
</html>
